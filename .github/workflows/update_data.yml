name: Auto Fetch Stock Data

on:
  schedule:
    # 毎時10分に実行
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz
          
      - name: Fetch data
        run: python fetch_data.py
        
      - name: Commit and push data.csv
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 1. 最初に最新情報をpullして、環境をGitHubと同期させる
          git pull origin main
          
          # 2. ここで fetch_data.py を動かす（これで最新の環境にファイルが作成される）
          python fetch_data.py
          
          # 3. 作成されたファイルをaddしてコミット・プッシュする
          if [ -f "data.csv" ]; then
            git add data.csv
            git commit -m "Auto-update data.csv" || echo "変更なし"
            git push
          else
            echo "エラー: data.csv が見つかりません"
            exit 1
          fi
