name: Auto Fetch Stock Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz
      
      # 1. リポジトリを最新にリベース（整合性を確保）
      - name: Pull latest changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase origin main

      # 2. データを取得・生成
      - name: Fetch data
        run: python fetch_data.py
        
      # 3. 差分をコミット・プッシュ
      - name: Commit and push data.csv
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 差分がある場合のみコミット
          git add data.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.csv" && git push)
