name: Auto Fetch Stock Data

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *' 
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install yfinance pandas pytz
      - name: Pull latest changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase origin main
      - name: Fetch data
        run: python fetch_data.py
      - name: Commit and push data.csv
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update data.csv"
          git push --force-with-lease origin main
