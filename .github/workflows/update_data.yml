name: Auto Fetch Stock Data

on:
  schedule:
    # 1時間ごとに自動実行する設定（UTC時間）
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動で実行できるボタンも追加

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas
          
      - name: Fetch data
        run: python fetch_data.py
        
      - name: Commit and push data.csv
        run: |
              git config --global user.email "action@github.com"
              git config --global user.name "GitHub Action"
              
              # 最新の状態を取り込む
              git pull --rebase origin main
              
              # data.csv がある場合のみ処理
              if [ -f "data.csv" ]; then
                git add data.csv
                # 変更があった時だけコミット
                git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.csv" && git push)
              else
                echo "data.csv が見つかりません"
              fi
