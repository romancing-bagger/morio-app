name: Auto Fetch Stock Data

on:
  schedule:
    # 毎時10分に実行
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz
          
      - name: Fetch data
        run: python fetch_data.py
        
      - name: Commit and push data.csv
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 【最重要】強制リセット：変更が残っていたら全て破棄して、GitHubの最新状態に合わせる
          git reset --hard HEAD
          
          # 最新の状態を取り込む（競合を避ける）
          git pull --rebase origin main
          
          # data.csv がある場合のみ処理
          if [ -f "data.csv" ]; then
            git add data.csv
            # 変更がある場合のみコミットしてプッシュ
            git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update data.csv" && git push)
          else
            echo "data.csv が見つかりません"
            exit 1
          fi
