name: Auto Fetch Stock Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz
      
      # 1. リポジトリを最新にリベース（整合性を確保）
      - name: Pull latest changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase origin main

      # 2. データを取得・生成
      - name: Fetch data
        run: python fetch_data.py
        
      # 3. 差分をコミット・プッシュ
      - name: Commit and push data.csv
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add data.csv
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update data.csv"
          
          # 【修正点】--force-with-lease を使う
          # これは「リモートに自分が見ていない変更がない場合のみ上書きする」という安全な強制プッシュです
          git push --force-with-lease origin main
